<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Your Ticket — IITH Sanchari</title>
<link rel="icon" type="image/svg+xml" href="assets/logo.svg">
<link rel="stylesheet" href="assets/app.css?v=5">
<style>
  .tk-wrap{max-width:420px;margin:0 auto;padding:0 16px 40px}
  .tk-top{display:flex;align-items:center;gap:12px;padding:16px 2px 10px}
  .tk-top a{width:34px;height:34px;border-radius:50%;background:var(--paper);border:1px solid var(--pline);
    display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0;box-shadow:0 6px 14px -8px var(--sh)}
  .tk-top a svg{width:16px;height:16px}
  .tk-top .ttl{font-size:16px;font-weight:800;letter-spacing:-.01em}

  .ticket{background:var(--paper);border:1px solid var(--pline);border-radius:22px;overflow:hidden;position:relative;
    box-shadow:0 20px 44px -22px var(--sh)}
  .tk-band{background:var(--grad-ox);color:#fff;padding:18px 20px 17px;position:relative}
  .tk-band::before{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 90% at 10% -15%,rgba(255,255,255,.35),transparent 55%)}
  .tk-band-in{position:relative}
  .tk-band .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .tk-route{font-size:19px;font-weight:800;letter-spacing:-.01em;line-height:1.25}
  .tk-bp{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;opacity:.85;text-align:right;line-height:1.4;white-space:nowrap}

  .tk-stamp{position:absolute;top:6px;right:10px;width:62px;height:62px;transform:rotate(-12deg);
    background:rgba(255,255,255,.95);border-radius:50%;color:var(--ox);z-index:3;
    box-shadow:0 8px 16px -6px rgba(0,0,0,.4)}
  .tk-stamp svg{width:100%;height:100%;display:block}

  .tk-meta{display:grid;grid-template-columns:1fr 1fr;gap:18px 12px;padding:20px 20px 6px}
  .tk-mcell{display:flex;gap:10px;align-items:flex-start;min-width:0}
  .tk-micon{width:40px;height:40px;border-radius:13px;background:var(--paper2);color:var(--ox);
    display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .tk-micon svg{width:19px;height:19px}
  .tk-lbl{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--m2)}
  .tk-val{font-size:14px;font-weight:700;color:var(--ink);margin-top:3px;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:6px;flex-wrap:wrap;overflow-wrap:anywhere}
  .tk-sub{font-size:10.5px;color:var(--m2);font-weight:600;margin-top:2px}
  .tk-paid{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;
    color:var(--live);background:rgba(31,138,76,.12);border-radius:999px;padding:3px 8px}
  .tk-paid i{width:5px;height:5px;border-radius:50%;background:var(--live);display:block}
  .tk-star{color:var(--goldt);font-weight:900}

  .tk-qrwrap{display:flex;flex-direction:column;align-items:center;padding:18px 20px 6px;position:relative}
  .tk-qr{width:min(200px,60vw);aspect-ratio:1;background:#fff;border-radius:16px;padding:12px;
    box-shadow:0 2px 8px var(--sh),0 0 0 1px var(--pline);display:flex;align-items:center;justify-content:center}
  .tk-qr svg{width:100%;height:100%;display:block}
  .tk-hint{font-size:11px;font-weight:700;color:var(--m2);margin-top:11px;letter-spacing:.02em}

  .tk-perf{border-top:2px dashed var(--pline);position:relative;margin:14px 16px 0}
  .tk-perf::before,.tk-perf::after{content:"";position:absolute;top:-10px;width:18px;height:18px;border-radius:50%;background:var(--stage)}
  .tk-perf::before{left:-25px}.tk-perf::after{right:-25px}
  .tk-stub{display:flex;justify-content:space-between;align-items:center;padding:13px 20px 18px}
  .tk-serial{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;letter-spacing:.08em;color:var(--m2)}
  .tk-valid{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--live)}
  .tk-valid i{width:7px;height:7px;border-radius:50%;background:var(--live);display:block;box-shadow:0 0 0 3px rgba(31,138,76,.18)}

  .tk-note{margin-top:16px;background:var(--paper2);border-radius:14px;padding:13px 15px;font-size:11.5px;line-height:1.55;color:var(--m2);text-align:center}
  .tk-err{text-align:center;padding:60px 20px;color:var(--m2)}
  .tk-err h2{color:var(--ink);font-size:17px;margin:10px 0 6px}
</style>
</head>
<body>
<div class="tk-wrap">
  <div class="tk-top">
    <a href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 19l-7-7 7-7"/></svg></a>
    <div class="ttl">Your ticket</div>
  </div>

  <div id="tk-content"></div>
</div>

<script src="assets/qrcode.js"></script>
<script>
(function(){
  function b64urlDecode(s){
    s = s.replace(/-/g,'+').replace(/_/g,'/');
    while (s.length % 4) s += '=';
    return decodeURIComponent(escape(atob(s)));
  }
  function fmtDate(ts){
    const d = new Date(ts*1000);
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
  }
  function fmtContact(c){
    const m = /^(\+91)(\d{5})(\d{5})$/.exec(c || '');
    return m ? m[1]+' '+m[2]+' '+m[3] : (c || '—');
  }

  const params = new URLSearchParams(window.location.search);
  const token = params.get('t');
  const el = document.getElementById('tk-content');

  if(!token || token.indexOf('.') === -1){
    el.innerHTML = '<div class="tk-err"><h2>No ticket found</h2><p>This link doesn\'t contain a valid ticket. Go back and buy a ticket first.</p></div>';
    return;
  }

  let ticket;
  try {
    const payloadB64 = token.split('.')[0];
    ticket = JSON.parse(b64urlDecode(payloadB64));
  } catch(e){
    el.innerHTML = '<div class="tk-err"><h2>Couldn\'t read this ticket</h2><p>The link looks corrupted. Try buying again.</p></div>';
    return;
  }

  const serial = (ticket.payment_id || '').replace('pay_','').toUpperCase();
  const isMiya = ticket.direction === 'to' ? (ticket.route_name||'').indexOf('Miyapur')>-1 : false;

  el.innerHTML =
    '<div class="ticket">' +
      '<div class="tk-band"><div class="tk-band-in">' +
        '<div class="row1"><div class="tk-route"></div><div class="tk-bp">Boarding<br>Pass</div></div>' +
      '</div></div>' +
      '<div class="tk-meta">' +
        '<div class="tk-mcell"><div class="tk-micon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg></div>' +
          '<div><div class="tk-lbl">Date</div><div class="tk-val"></div><div class="tk-sub"></div></div></div>' +
        '<div class="tk-mcell"><div class="tk-micon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2"/></svg></div>' +
          '<div><div class="tk-lbl">Departs</div><div class="tk-val"></div><div class="tk-sub">Scheduled</div></div></div>' +
        '<div class="tk-mcell"><div class="tk-micon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="7"/><path d="M12 13V9M9 3h6"/></svg></div>' +
          '<div><div class="tk-lbl">Journey</div><div class="tk-val"></div><div class="tk-sub">Approx.</div></div></div>' +
        '<div class="tk-mcell"><div class="tk-micon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v18"/><path d="M6 4h11l-2.5 4L17 12H6"/></svg></div>' +
          '<div><div class="tk-lbl">Est. arrival</div><div class="tk-val"></div><div class="tk-sub">Approx.</div></div></div>' +
        '<div class="tk-mcell"><div class="tk-micon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.7a2 2 0 0 1-.4 2.1L8 9.9a16 16 0 0 0 6 6l1.4-1.4a2 2 0 0 1 2.1-.4c.9.3 1.8.5 2.7.6a2 2 0 0 1 1.8 2.1z"/></svg></div>' +
          '<div><div class="tk-lbl">Contact</div><div class="tk-val"></div></div></div>' +
        '<div class="tk-mcell"><div class="tk-micon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h12M6 9h12M6 4c4 0 7 1.5 7 5s-3 5-7 5l7 6"/></svg></div>' +
          '<div><div class="tk-lbl">Fare</div><div class="tk-val"></div></div></div>' +
      '</div>' +
      '<div class="tk-qrwrap">' +
        '<div class="tk-stamp"><svg viewBox="0 0 100 100">' +
          '<circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="3"/>' +
          '<circle cx="50" cy="50" r="37" fill="none" stroke="currentColor" stroke-width="1.4" stroke-dasharray="2.5 3"/>' +
          '<path d="M30 50l13 13 27-28" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>' +
          '<text x="50" y="76" text-anchor="middle" font-size="10.5" font-weight="800" letter-spacing="1" fill="currentColor">VERIFIED</text>' +
        '</svg></div>' +
        '<div class="tk-qr" id="tk-qr-holder"></div><div class="tk-hint">Show this to the driver to board</div>' +
      '</div>' +
      '<div class="tk-perf"></div>' +
      '<div class="tk-stub"><span class="tk-serial"></span><span class="tk-valid"><i></i>Valid</span></div>' +
    '</div>' +
    '<div class="tk-note">Single-use check-in by drivers isn’t wired up yet — this ticket is cryptographically signed and genuine, but that verification loop is coming in a later phase.</div>';

  el.querySelector('.tk-route').textContent = ticket.route_display || ticket.route_name || 'Route';
  const vals = el.querySelectorAll('.tk-val');
  const subs = el.querySelectorAll('.tk-sub');
  const DOW=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  vals[0].textContent = fmtDate(ticket.issued_at);
  subs[0].textContent = DOW[new Date(ticket.issued_at*1000).getDay()];
  vals[1].textContent = ticket.departure_display || '—';
  vals[2].textContent = ticket.journey_display || '—';
  vals[3].textContent = (ticket.arrival_display || '—') + (ticket.arrival_display ? ' *' : '');
  vals[4].textContent = fmtContact(ticket.contact);
  vals[4].style.fontVariantNumeric = 'normal';
  vals[5].textContent = '₹' + ticket.fare;
  vals[5].insertAdjacentHTML('beforeend', '<span class="tk-paid"><i></i>Paid</span>');
  el.querySelector('.tk-serial').textContent = serial;

  const qr = qrcode(0, 'M');
  qr.addData(token);
  qr.make();
  document.getElementById('tk-qr-holder').innerHTML = qr.createSvgTag({cellSize:4, margin:0});
})();
</script>
</body>
</html>
